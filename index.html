<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | TENDEX</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .login-card { background: rgba(255,255,255,0.96); border-radius: 2rem; width: 100%; max-width: 420px; padding: 2rem; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4); animation: fadeSlideUp 0.5s ease; }
    @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    .login-header { text-align: center; margin-bottom: 2rem; }
    .login-header h1 { font-size: 2rem; background: linear-gradient(120deg, #0f2b3d, #1e4a76); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-weight: 600; font-size: 0.85rem; color: #1e2a3e; margin-bottom: 0.5rem; }
    .input-group input { width: 100%; padding: 0.9rem 1rem; font-size: 1rem; border: 1.5px solid #e2e8f0; border-radius: 1.2rem; outline: none; transition: 0.2s; }
    .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    .btn-entrar { width: 100%; background: linear-gradient(98deg, #0f2b3d, #1e4a76); border: none; padding: 0.9rem; font-size: 1.1rem; font-weight: 700; color: white; border-radius: 2rem; cursor: pointer; transition: 0.25s; }
    .btn-entrar:hover { background: linear-gradient(98deg, #1e3a5f, #0f2b3d); transform: scale(0.98); }
    .error-message { color: #b91c1c; background: #fee2e2; padding: 0.6rem; border-radius: 2rem; text-align: center; margin-top: 1rem; font-size: 0.85rem; }
    .info-message { color: #075985; background: #e0f2fe; padding: 0.6rem; border-radius: 2rem; text-align: center; margin-top: 1rem; font-size: 0.85rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <h1>🔐 TENDEX</h1>
    <p>Inspeção de Tendas</p>
  </div>
  <form id="loginForm">
    <div class="input-group">
      <label>👤 Usuário</label>
      <input type="text" id="username" placeholder="Digite seu usuário" required>
    </div>
    <div class="input-group">
      <label>🔒 Senha</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-entrar">ENTRAR</button>
    <div id="messageContainer"></div>
  </form>
</div>
<script>
  const form = document.getElementById('loginForm');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const messageDiv = document.getElementById('messageContainer');

  async function loadCredentials() {
    try {
      const response = await fetch('credenciais.txt?t=' + Date.now());
      if (!response.ok) throw new Error('Arquivo de credenciais não encontrado');
      const text = await response.text();
      const lines = text.split(/\r?\n/);
      const credentials = [];
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed === '' || trimmed.startsWith('#')) continue;
        const parts = trimmed.split(':');
        if (parts.length >= 2) {
          credentials.push({
            username: parts[0].trim(),
            password: parts[1].trim(),
            email: parts[2] ? parts[2].trim() : parts[0].trim() + '@tendex.com'
          });
        }
      }
      return credentials;
    } catch (err) {
      console.error('Erro ao carregar credenciais:', err);
      return [];
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = usernameInput.value.trim();
    const password = passwordInput.value;
    if (!username || !password) {
      messageDiv.innerHTML = '<div class="error-message">❌ Preencha usuário e senha</div>';
      return;
    }
    messageDiv.innerHTML = '<div class="info-message">⏳ Verificando...</div>';
    const credentials = await loadCredentials();
    const user = credentials.find(c => c.username === username && c.password === password);
    if (user) {
      localStorage.setItem('tendex_current_user', JSON.stringify({
        username: user.username,
        email: user.email
      }));
      messageDiv.innerHTML = '<div class="info-message">✅ Login bem-sucedido! Redirecionando...</div>';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
    } else {
      messageDiv.innerHTML = '<div class="error-message">❌ Usuário ou senha incorretos</div>';
      passwordInput.value = '';
    }
  });
  usernameInput.focus();
</script>
</body>
</html>
