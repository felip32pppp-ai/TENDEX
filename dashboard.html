<!DOCTYPE html>
<html lang="pt">
<head>

  <style>

    .pdf-row { display: flex; align-items: center; justify-content: space-between; background: #f9fafb; margin-bottom: 0.5rem; padding: 0.4rem 0.8rem; border-radius: 2rem; font-size: 0.75rem; }

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body>

<div class="dashboard-header">

    </div>
    <div class="form-group">
      <label>Sub. Localização</label>

    <div class="form-group">

      <input type="text" id="newTamanho" placeholder="Ex: 5x5m, 10x20m">
    </div>

      <input type="text" id="newItemCode" placeholder="Ex: T-001">

    <div class="attachments-title">📄 Memorial de Cálculo e Projeto</div>

      <label>Memorial:</label>
      <input type="file" id="newMemorialFile" accept=".pdf">

    <div id="newMonthlyFilesContainer"></div>

      <button class="btn-save" id="confirmCreateBtn">Salvar</button>

</div>

<!-- Modal de detalhes do item -->
<div id="detailModal" class="modal">

      <button class="close-modal" id="closeDetailModalBtn">&times;</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- Modal do formulário completo para preencher e gerar PDF -->
<div id="formModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="formModalTitle">Formulário de Inspeção</h2>
      <button class="close-modal" id="closeFormModalBtn">&times;</button>
    </div>
    <div id="formFieldsContainer"></div>
    <div class="modal-buttons">
      <button class="btn-cancel" id="cancelFormBtn">Cancelar</button>
      <button class="btn-save" id="generatePdfBtn">Gerar PDF e Anexar</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ==================== CONFIGURAÇÃO SUPABASE ====================
    const SUPABASE_URL = "https://jklcvyuxwxgsfczrfaco.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_oCE8y5qaLovVj0BU-rANHA__Zmy3XVl";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    const monthKeys = ["jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];

    // Lista completa de perguntas (25 itens)
    const checklistPerguntas = [
      "[IMPEDITIVO] [Projeto] As tendas/ Galpões lonados possuem Projeto Estrutural e Anotação de Responsabilidade Técnica executado por um Engenheiro habilitado pelo CREA e está aderente? (caso as tendas/galpões lonados não possua projeto, considerar impeditivo)",
      "[Projeto] As tendas/ Galpões lonados utilizados como abrigo seguro possuem Projeto de SPDA e Anotação de Responsabilidade Técnica executado por um Engenheiro habilitado pelo CREA e está vigente? (ver NBR-ABNT 5419). (referência, tendas >25 m²)",
      "[Projeto] As tendas/ Galpões lonados utilizados para cobrir estruturas de canteiro, possuem aterramento conforme projeto do canteiro de obras?",
      "[Projeto] O manual de instrução/ montagem do fabricante estão disponíveis na frente de serviço?",
      "[Projeto] As tendas/ Galpões lonados, possuem a placa de liberação com data e responsável?",
      "[Projeto] As tendas/ Galpões lonados possuem plano de inspeção e o mesmo está aderente, conforme projeto? (referência, tendas >25 m²)",
      "[Projeto] O formulário de inspeção anterior está disponível na frente de serviço? (referência, tendas >25 m²)",
      "[Inspeção] A aranha (estrutura de sustentação da lona), estão em bom estado de conservação, parafusadas com parafuso autotravante, tanto na parte superior e inferior do teto? conforme inspeção visual? não apresentando corrosão e/ou deformação?",
      "[Inspeção] As Cintas Poliéster estão tensionada e não apresentam deformação, fissuras ou cortes, conforme projeto?",
      "[Inspeção] As colunas de escoramento e colunas de sustentação (pilares) estão alinhadas perpendicular (90°) as vigas e não apresentam corrosão e/ou deformação?",
      "[Inspeção] As colunas de sustentação estão encaixadas e parafusadas às vigas e possuem mão francesa?",
      "[Inspeção] As mãos francesas possuem parafusos autotravantes de encaixe nas vigas e pilares?",
      "[Inspeção] As tendas/ Galpões lonados não estão montadas próximo à escavação, taludes ou pilhas de materiais onde exista risco de ser atingido em caso de deslizamento ou ruptura? (distância a ser definida conforme projeto).",
      "[Inspeção] As travas (parafusos cabeça sextavado, porcas sextavada, pino em L, arruela lisa, chumbadores, porca e contraporca, ou porca autotravante) apresentam sinais de corrosão ou folgas?",
      "[Inspeção] As vigas (calha treliçada), estão alinhadas perpendicular (90°) aos pilares e não apresentam corrosão e/ou deformação?",
      "[Inspeção] Os cabos de aço estão tensionados e possuem clips, não possuem fissuras ou corrosão, e possuem sapatilhas para fixação, conforme projeto?",
      "[Inspeção] Todas as colunas de sustentação (pilares) possuem estaiamento com Cinta Poliéster e/ou cabo de aço conforme projeto e catraca vinculada a um Chumbador - Finca / Parabole? Ângulo mínimo de 60° entre o estaiamento e o pilar.",
      "[Inspeção] Todas as colunas de sustentação (pilares) possuem no mínimo 02 Chumbadores - Finca com ponto de solda na base / Parabole por pilar?",
      "[Inspeção] A lona / Sombrite do fechamento lateral, esta em bom estado de conservação, não apresenta rasgos, furos, esta amarrada e esticada em todos os pontos de fixação conforme projeto?",
      "[Inspeção] A lona / Sombrite do teto, esta em bom estado de conservação, não apresenta rasgos, furos, esta esticada e amarrada às vigas em todos os pontos de fixação, conforme projeto?",
      "[Inspeção] As calhas de água de chuva e o interior dos pilares vazados estão totalmente desobstruídos? (quando aplicável no projeto).",
      "[Inspeção] As tendas/ Galpões lonados estão montadas a uma distância segura de rede elétrica, equipamento ou árvores que ofereça risco de queda de peças e materiais?",
      "[Inspeção] As tendas/galpões lonados utilizadas para ocupação de pessoas possuem sinalização de saída de emergência e alarme de emergência, conforme projeto? (adotar o item conforme indicação do projeto)",
      "[Inspeção] O sistema de iluminação (se aplicável), estão instalados corretamente?",
      "[Inspeção] A lona de cobertura está sem nenhuma deformação ocasionada por acumulo de água, folhas, minério, etc.?"
    ];

    // Variáveis de controle do formulário
    let currentFormItemId = null;
    let currentFormCategory = null;
    let currentFormMonthName = null;

    // ==================== FUNÇÕES DE BANCO ====================
    async function getAllItemsWithFiles() {
      const { data: items, error: itemsError } = await supabase
        .from('items')
        .select('*')
        .order('id', { ascending: true });
      if (itemsError) throw itemsError;
      const { data: files, error: filesError } = await supabase
        .from('files')
        .select('*');
      if (filesError) throw filesError;
      const filesByItem = {};
      files.forEach(file => {
        if (!filesByItem[file.item_id]) filesByItem[file.item_id] = [];
        filesByItem[file.item_id].push(file);
      });
      return items.map(item => ({
        id: item.id,
        name: item.name,
        sub_localizacao: item.sub_localizacao || '',
        tamanho: item.tamanho || '',
        code: item.code,
        files: filesByItem[item.id] || []
      }));
    }

    async function addFileToItem(itemId, category, file) {
      const fileExt = file.name.split('.').pop();
      const filePath = `itens/${itemId}/${category}_${Date.now()}.${fileExt}`;
      const { error: uploadError } = await supabase.storage
        .from('pdfs')
        .upload(filePath, file);
      if (uploadError) throw uploadError;
      const { data: publicUrlData } = supabase.storage.from('pdfs').getPublicUrl(filePath);
      const fileUrl = publicUrlData.publicUrl;

      const { data: existing, error: findError } = await supabase
        .from('files')
        .select('id')
        .eq('item_id', itemId)
        .eq('category', category)
        .maybeSingle();
      if (findError) throw findError;

      if (existing) {
        const { error: updateError } = await supabase
          .from('files')
          .update({ file_name: file.name, file_url: fileUrl })
          .eq('id', existing.id);
        if (updateError) throw updateError;
      } else {
        const { error: insertError } = await supabase
          .from('files')
          .insert({ item_id: itemId, category, file_name: file.name, file_url: fileUrl });
        if (insertError) throw insertError;
      }
    }

    async function deleteFileById(fileId) {
      const { error } = await supabase.from('files').delete().eq('id', fileId);
      if (error) throw error;
    }

    async function deleteItemAndFiles(itemId) {
      const { error } = await supabase.from('items').delete().eq('id', itemId);
      if (error) throw error;
    }

    async function saveItemComplete(itemId, name, sub_localizacao, tamanho, code, filesToProcess) {
      const { data: existing, error: dupError } = await supabase
        .from('items')
        .select('id')
        .eq('code', code)
        .maybeSingle();
      if (dupError) throw dupError;
      if (existing && existing.id !== itemId) {
        throw new Error(`O código "${code}" já está em uso.`);
      }

      const uploadedUrls = [];
      for (const item of filesToProcess) {
        if (item.file) {
          const fileExt = item.file.name.split('.').pop();
          const tempId = itemId || 'temp';
          const filePath = `itens/${tempId}/${item.category}_${Date.now()}.${fileExt}`;
          const { error: uploadError } = await supabase.storage
            .from('pdfs')
            .upload(filePath, item.file);
          if (uploadError) throw uploadError;
          const { data: publicUrlData } = supabase.storage.from('pdfs').getPublicUrl(filePath);
          uploadedUrls.push({
            category: item.category,
            url: publicUrlData.publicUrl,
            fileName: item.file.name
          });
        } else {
          uploadedUrls.push({ category: item.category, url: null });
        }
      }

      let itemIdFinal = itemId;
      const itemData = { name, sub_localizacao, tamanho, code };
      if (itemId) {
        const { error: updateError } = await supabase
          .from('items')
          .update(itemData)
          .eq('id', itemId);
        if (updateError) throw updateError;
      } else {
        const { data: newItem, error: insertError } = await supabase
          .from('items')
          .insert(itemData)
          .select()
          .single();
        if (insertError) throw insertError;
        itemIdFinal = newItem.id;
      }

      for (const fileInfo of uploadedUrls) {
        if (fileInfo.url) {
          const { data: existingFile, error: findError } = await supabase
            .from('files')
            .select('id')
            .eq('item_id', itemIdFinal)
            .eq('category', fileInfo.category)
            .maybeSingle();
          if (findError) throw findError;
          if (existingFile) {
            await supabase.from('files').update({ file_name: fileInfo.fileName, file_url: fileInfo.url }).eq('id', existingFile.id);
          } else {
            await supabase.from('files').insert({ item_id: itemIdFinal, category: fileInfo.category, file_name: fileInfo.fileName, file_url: fileInfo.url });
          }
        }
      }
      return itemIdFinal;
    }

    // ==================== GERAR PDF COM LAYOUT PADRÃO ====================
    async function generateAndAttachPdf(itemId, category, monthName, formData) {
      try {
        if (!window.PDFLib) throw new Error("PDF-lib não carregado.");
        const { PDFDocument, StandardFonts, rgb, degrees } = window.PDFLib;
        const pdfDoc = await PDFDocument.create();
        const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
        const boldFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

        // Adicionar página A4 (595x842)
        const page = pdfDoc.addPage([595, 842]);
        const { width, height } = page;
        let y = height - 50;
        const margin = 50;
        const lineHeight = 16;
        const columnX = { num: margin, pergunta: margin + 35, resposta: margin + 420, observacao: margin + 480 };
        const colWidth = { pergunta: 380, resposta: 55, observacao: 60 };

        // Função auxiliar para escrever texto e controlar quebra de página
        function drawTextLine(text, x, y, size, fontType = font, color = rgb(0,0,0)) {
          if (y < 50) {
            const newPage = pdfDoc.addPage([595, 842]);
            y = height - 50;
          }
          page.drawText(text, { x, y, size, font: fontType, color });
          return y - lineHeight;
        }

        // ========= CABEÇALHO =========
        page.drawText("Formulário Padrão", { x: margin, y: y, size: 14, font: boldFont, color: rgb(0,0,0) });
        y -= 20;
        page.drawText("VALE", { x: margin, y: y, size: 12, font: boldFont, color: rgb(0,0.4,0.6) });
        y -= 20;
        page.drawText("Inspeção de SSMA em Tendas e Galpões Lonados", { x: margin, y: y, size: 12, font: boldFont });
        y -= 25;

        // Campos de identificação
        const campos = [
          `Nome da Localidade: ${formData.localidade || ''}`,
          `Latitude (GD): ${formData.latitude || '0,00000000000'}`,
          `Longitude (GD): ${formData.longitude || '0,00000000000'}`,
          `Responsável pelo Preenchimento - Nome: ${formData.resp_nome || ''}`,
          `Responsável pelo Preenchimento - Matrícula: ${formData.resp_matricula || ''}`,
          `Data da Inspeção: ${formData.data_inspecao || ''}`,
          `Empresa: ${formData.empresa || ''}`,
          `Inspetor/Auditor: ${formData.inspetor_nome || ''}`,
          `Matrícula: ${formData.inspetor_matricula || ''}`,
          `CPF: ${formData.inspetor_cpf || ''}`,
          `SAP ID: ${formData.inspetor_sap || ''}`,
          `Nome do Inspetor: ${formData.inspetor_nome2 || ''}`,
          `Entrevistados: ${formData.entrevistados || ''}`
        ];
        for (const campo of campos) {
          page.drawText(campo, { x: margin, y: y, size: 9, font: font });
          y -= 14;
          if (y < 60) {
            const newPage = pdfDoc.addPage([595, 842]);
            y = height - 50;
          }
        }
        y -= 10;

        // Tabela: cabeçalho
        page.drawText("Nº", { x: columnX.num, y: y, size: 10, font: boldFont });
        page.drawText("Pergunta", { x: columnX.pergunta, y: y, size: 10, font: boldFont });
        page.drawText("Resposta", { x: columnX.resposta, y: y, size: 10, font: boldFont });
        page.drawText("Observação", { x: columnX.observacao, y: y, size: 10, font: boldFont });
        y -= 5;
        page.drawLine({ start: { x: margin, y: y+2 }, end: { x: width - margin, y: y+2 }, thickness: 1, color: rgb(0,0,0) });
        y -= 12;

        // Percorrer perguntas
        for (let i = 0; i < checklistPerguntas.length; i++) {
          if (y < 60) {
            const newPage = pdfDoc.addPage([595, 842]);
            y = height - 50;
            // redesenhar cabeçalho da tabela na nova página
            page.drawText("Nº", { x: columnX.num, y: y, size: 10, font: boldFont });
            page.drawText("Pergunta", { x: columnX.pergunta, y: y, size: 10, font: boldFont });
            page.drawText("Resposta", { x: columnX.resposta, y: y, size: 10, font: boldFont });
            page.drawText("Observação", { x: columnX.observacao, y: y, size: 10, font: boldFont });
            y -= 5;
            page.drawLine({ start: { x: margin, y: y+2 }, end: { x: width - margin, y: y+2 }, thickness: 1, color: rgb(0,0,0) });
            y -= 12;
          }
          const pergunta = checklistPerguntas[i];
          const resposta = formData[`resp_${i}`] || "Não respondido";
          const obs = formData[`obs_${i}`] || "";
          // Número
          page.drawText(`${i+1}`, { x: columnX.num, y: y, size: 9, font: font });
          // Pergunta (truncar se muito longa)
          let perguntaStr = pergunta.length > 70 ? pergunta.substring(0, 67) + "..." : pergunta;
          page.drawText(perguntaStr, { x: columnX.pergunta, y: y, size: 8, font: font });
          // Resposta com cor
          let respColor = rgb(0,0,0);
          if (resposta === "Conforme") respColor = rgb(0,0.6,0);
          else if (resposta === "Não conforme") respColor = rgb(0.8,0,0);
          else if (resposta === "Não se aplica") respColor = rgb(0.5,0.5,0.5);
          page.drawText(resposta, { x: columnX.resposta, y: y, size: 8, font: boldFont, color: respColor });
          // Observação (truncada)
          let obsStr = obs.length > 20 ? obs.substring(0, 17) + "..." : obs;
          page.drawText(obsStr, { x: columnX.observacao, y: y, size: 8, font: font });
          y -= lineHeight;
        }

        // Rodapé com número de página
        const pages = pdfDoc.getPages();
        pages.forEach((pg, idx) => {
          pg.drawText(`Página ${idx+1} de ${pages.length}`, { x: margin, y: 30, size: 8, font: font, color: rgb(0.5,0.5,0.5) });
        });

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const file = new File([blob], `checklist_${monthName}_${Date.now()}.pdf`, { type: 'application/pdf' });
        await addFileToItem(itemId, category, file);
        alert(`PDF gerado e anexado ao mês ${monthName}!`);
        await refreshData();
        await openDetailModal(itemId);
      } catch (err) {
        console.error(err);
        alert("Erro ao gerar PDF: " + err.message);
      }
    }

    // ==================== RENDERIZAÇÃO ====================
    let currentItems = [];

    function renderCards(filterText = "") {
      const container = document.getElementById('itemsContainer');
      const lowerFilter = filterText.toLowerCase();
      const filtered = currentItems.filter(item => 
        item.name.toLowerCase().includes(lowerFilter) ||
        item.code.toLowerCase().includes(lowerFilter) ||
        (item.sub_localizacao && item.sub_localizacao.toLowerCase().includes(lowerFilter)) ||
        (item.tamanho && item.tamanho.toLowerCase().includes(lowerFilter))
      );
      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">✨ Nenhum item encontrado.</div>`;
        return;
      }
      container.innerHTML = filtered.map(item => `
        <div class="item-card" data-id="${item.id}">
          <h3>📌 ${escapeHtml(item.name)}</h3>
          <p>ID: ${escapeHtml(item.code)}</p>
          ${item.sub_localizacao ? `<p>📍 ${escapeHtml(item.sub_localizacao)}</p>` : ''}
          ${item.tamanho ? `<p>📏 ${escapeHtml(item.tamanho)}</p>` : ''}
        </div>
      `).join('');

      document.querySelectorAll('.item-card').forEach(card => {
        card.addEventListener('click', () => openDetailModal(parseInt(card.dataset.id)));
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    async function refreshData() {
      currentItems = await getAllItemsWithFiles();
      const searchInput = document.getElementById('searchInput');
      renderCards(searchInput.value);
    }

    // ==================== MODAL DE DETALHES ====================
    const detailModal = document.getElementById('detailModal');
    const detailContent = document.getElementById('detailContent');
    const closeDetailBtn = document.getElementById('closeDetailModalBtn');

    async function openDetailModal(itemId) {
      const item = currentItems.find(i => i.id === itemId);
      if (!item) return;
      detailContent.innerHTML = '<div class="loading">Carregando...</div>';
      detailModal.style.display = 'flex';

      const freshItems = await getAllItemsWithFiles();
      const freshItem = freshItems.find(i => i.id === itemId);
      if (!freshItem) return;
      renderItemDetailModal(freshItem);
    }

    function renderItemDetailModal(item) {
      const files = item.files;
      const memorialFile = files.find(f => f.category === 'memorial');
      const monthlyFiles = monthKeys.map(key => files.find(f => f.category === key));

      let html = `
        <div class="item-detail-title">
          <strong>${escapeHtml(item.name)}</strong><br>
          ${item.sub_localizacao ? `📍 Sub. Localização: ${escapeHtml(item.sub_localizacao)}<br>` : ''}
          ${item.tamanho ? `📏 Tamanho: ${escapeHtml(item.tamanho)}<br>` : ''}
          ID: ${escapeHtml(item.code)}
        </div>
        <div class="pdf-group">
          <div class="pdf-group-title">📄 Memorial de Cálculo</div>
          ${renderDetailPdfRow('memorial', 'Memorial', memorialFile, item.id)}
        </div>
        <div class="pdf-group">
          <div class="pdf-group-title">📅 Documentos Mensais</div>
          ${monthNames.map((month, idx) => renderDetailPdfRow(monthKeys[idx], month, monthlyFiles[idx], item.id, true)).join('')}
        </div>
        <button class="delete-item-btn" id="deleteItemFromDetailBtn">🗑️ Excluir este item</button>
        <div class="notice">* Clique nos botões + para anexar/substituir PDFs. Clique em 📝 para preencher formulário e gerar PDF.</div>
      `;
      detailContent.innerHTML = html;

      document.querySelectorAll('.upload-pdf-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const itemId = Number(btn.dataset.itemid);
          const category = btn.dataset.category;
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = '.pdf';
          input.onchange = async (ev) => {
            const file = ev.target.files[0];
            if (file && file.type === 'application/pdf') {
              try {
                await addFileToItem(itemId, category, file);
                refreshData();
                openDetailModal(itemId);
              } catch (err) {
                alert('Erro ao adicionar PDF: ' + err.message);
              }
            } else if (file) alert('Selecione um PDF.');
          };
          input.click();
        });
      });

      document.querySelectorAll('.remove-pdf-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const fileId = Number(btn.dataset.fileid);
          if (confirm('Remover este PDF?')) {
            await deleteFileById(fileId);
            refreshData();
            openDetailModal(item.id);
          }
        });
      });

      document.querySelectorAll('.fill-form-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const itemId = Number(btn.dataset.itemid);
          const category = btn.dataset.category;
          const monthName = btn.dataset.monthname;
          openFormModal(itemId, category, monthName);
        });
      });

      const deleteBtn = document.getElementById('deleteItemFromDetailBtn');
      if (deleteBtn) {
        deleteBtn.addEventListener('click', async () => {
          if (confirm(`Tem certeza que deseja excluir o item "${item.name}" e todos os seus PDFs?`)) {
            await deleteItemAndFiles(item.id);
            detailModal.style.display = 'none';
            refreshData();
          }
        });
      }
    }

    function renderDetailPdfRow(category, label, file, itemId, showFormButton = false) {
      if (file) {
        return `
          <div class="pdf-row">
            <span class="pdf-label">${escapeHtml(label)}</span>
            <div class="pdf-file-info">
              <a href="${file.file_url}" target="_blank">📄 ${escapeHtml(file.file_name)}</a>
            </div>
            <div class="pdf-actions">
              <button class="upload-pdf-btn" data-itemid="${itemId}" data-category="${category}" title="Substituir PDF">🔄</button>
              <button class="remove-pdf-btn" data-fileid="${file.id}" title="Remover">✖</button>
              ${showFormButton ? `<button class="fill-form-btn" data-itemid="${itemId}" data-category="${category}" data-monthname="${label}" title="Preencher formulário">📝</button>` : ''}
            </div>
          </div>
        `;
      } else {
        return `
          <div class="pdf-row">
            <span class="pdf-label">${escapeHtml(label)}</span>
            <div class="pdf-file-info">— Nenhum PDF anexado —</div>
            <div class="pdf-actions">
              <button class="upload-pdf-btn" data-itemid="${itemId}" data-category="${category}" title="Adicionar PDF">➕</button>
              ${showFormButton ? `<button class="fill-form-btn" data-itemid="${itemId}" data-category="${category}" data-monthname="${label}" title="Preencher formulário">📝</button>` : ''}
            </div>
          </div>
        `;
      }
    }

    // ==================== MODAL DO FORMULÁRIO ====================
    const formModal = document.getElementById('formModal');
    const formModalTitle = document.getElementById('formModalTitle');
    const formFieldsContainer = document.getElementById('formFieldsContainer');
    const closeFormModalBtn = document.getElementById('closeFormModalBtn');
    const cancelFormBtn = document.getElementById('cancelFormBtn');
    const generatePdfBtn = document.getElementById('generatePdfBtn');

    function openFormModal(itemId, category, monthName) {
      currentFormItemId = itemId;
      currentFormCategory = category;
      currentFormMonthName = monthName;
      formModalTitle.innerText = `Formulário de Inspeção - ${monthName}`;
      
      let html = `
        <div class="form-row">
          <div class="form-group"><label>Nome da Localidade</label><input type="text" id="localidade"></div>
          <div class="form-group"><label>Latitude (GD)</label><input type="text" id="latitude" value="0,00000000000"></div>
          <div class="form-group"><label>Longitude (GD)</label><input type="text" id="longitude" value="0,00000000000"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Responsável - Nome</label><input type="text" id="resp_nome"></div>
          <div class="form-group"><label>Responsável - Matrícula</label><input type="text" id="resp_matricula"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Data da Inspeção</label><input type="date" id="data_inspecao"></div>
          <div class="form-group"><label>Empresa</label><input type="text" id="empresa"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Inspetor/Auditor</label><input type="text" id="inspetor_nome"></div>
          <div class="form-group"><label>Matrícula</label><input type="text" id="inspetor_matricula"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>CPF</label><input type="text" id="inspetor_cpf"></div>
          <div class="form-group"><label>SAP ID</label><input type="text" id="inspetor_sap"></div>
          <div class="form-group"><label>Nome</label><input type="text" id="inspetor_nome2"></div>
        </div>
        <div class="form-group"><label>Entrevistados</label><textarea id="entrevistados" rows="2"></textarea></div>
        <hr style="margin: 1rem 0;">
        <h3>Checklist de Inspeção</h3>
      `;
      
      for (let i = 0; i < checklistPerguntas.length; i++) {
        html += `
          <div class="question-group">
            <div class="question-text">${i+1}. ${escapeHtml(checklistPerguntas[i])}</div>
            <div class="question-options">
              <label><input type="radio" name="resp_${i}" value="Conforme"> Conforme</label>
              <label><input type="radio" name="resp_${i}" value="Não conforme"> Não conforme</label>
              <label><input type="radio" name="resp_${i}" value="Não se aplica"> Não se aplica</label>
            </div>
            <div class="question-obs"><input type="text" placeholder="Observação (opcional)" id="obs_${i}" style="width:100%;"></div>
          </div>
        `;
      }
      formFieldsContainer.innerHTML = html;
      formModal.style.display = 'flex';
    }

    closeFormModalBtn.addEventListener('click', () => { formModal.style.display = 'none'; });
    cancelFormBtn.addEventListener('click', () => { formModal.style.display = 'none'; });

    generatePdfBtn.addEventListener('click', async () => {
      // Coletar dados do cabeçalho
      const formData = {
        localidade: document.getElementById('localidade')?.value || '',
        latitude: document.getElementById('latitude')?.value || '0,00000000000',
        longitude: document.getElementById('longitude')?.value || '0,00000000000',
        resp_nome: document.getElementById('resp_nome')?.value || '',
        resp_matricula: document.getElementById('resp_matricula')?.value || '',
        data_inspecao: document.getElementById('data_inspecao')?.value || '',
        empresa: document.getElementById('empresa')?.value || '',
        inspetor_nome: document.getElementById('inspetor_nome')?.value || '',
        inspetor_matricula: document.getElementById('inspetor_matricula')?.value || '',
        inspetor_cpf: document.getElementById('inspetor_cpf')?.value || '',
        inspetor_sap: document.getElementById('inspetor_sap')?.value || '',
        inspetor_nome2: document.getElementById('inspetor_nome2')?.value || '',
        entrevistados: document.getElementById('entrevistados')?.value || '',
        itemName: currentItems.find(i => i.id === currentFormItemId)?.name || '',
        itemCode: currentItems.find(i => i.id === currentFormItemId)?.code || ''
      };
      // Coletar respostas e observações
      for (let i = 0; i < checklistPerguntas.length; i++) {
        const radio = document.querySelector(`input[name="resp_${i}"]:checked`);
        formData[`resp_${i}`] = radio ? radio.value : "Não respondido";
        const obs = document.getElementById(`obs_${i}`)?.value || '';
        formData[`obs_${i}`] = obs;
      }
      // Validar data e responsável mínimo
      if (!formData.data_inspecao || !formData.resp_nome) {
        alert("Preencha pelo menos a Data da Inspeção e o Responsável - Nome.");
        return;
      }
      try {
        await generateAndAttachPdf(currentFormItemId, currentFormCategory, currentFormMonthName, formData);
        formModal.style.display = 'none';
      } catch (err) {
        alert("Erro: " + err.message);
      }
    });

    // ==================== MODAL DE CRIAÇÃO ====================
    const createModal = document.getElementById('createItemModal');
    const closeCreateBtn = document.getElementById('closeCreateModalBtn');
    const cancelCreateBtn = document.getElementById('cancelCreateBtn');
    const confirmCreateBtn = document.getElementById('confirmCreateBtn');
    const newItemName = document.getElementById('newItemName');
    const newSubLocalizacao = document.getElementById('newSubLocalizacao');
    const newTamanho = document.getElementById('newTamanho');
    const newItemCode = document.getElementById('newItemCode');
    const newMemorialFile = document.getElementById('newMemorialFile');
    const newMonthlyContainer = document.getElementById('newMonthlyFilesContainer');
    const createCodeError = document.getElementById('createCodeError');

    function buildNewMonthlyInputs() {
      newMonthlyContainer.innerHTML = '';
      monthNames.forEach((month, idx) => {
        const div = document.createElement('div');
        div.className = 'month-group';
        const label = document.createElement('label');
        label.textContent = month + ':';
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pdf';
        input.id = `new_month_${monthKeys[idx]}`;
        div.appendChild(label);
        div.appendChild(input);
        newMonthlyContainer.appendChild(div);
      });
    }
    buildNewMonthlyInputs();

    function openCreateModal() {
      newItemName.value = '';
      newSubLocalizacao.value = '';
      newTamanho.value = '';
      newItemCode.value = '';
      newMemorialFile.value = '';
      monthKeys.forEach(key => {
        const inp = document.getElementById(`new_month_${key}`);
        if (inp) inp.value = '';
      });
      createCodeError.innerText = '';
      createModal.style.display = 'flex';
    }

    closeCreateBtn.addEventListener('click', () => { createModal.style.display = 'none'; });
    cancelCreateBtn.addEventListener('click', () => { createModal.style.display = 'none'; });

    confirmCreateBtn.addEventListener('click', async () => {
      const name = newItemName.value.trim();
      const sub_localizacao = newSubLocalizacao.value.trim();
      const tamanho = newTamanho.value.trim();
      const code = newItemCode.value.trim();
      if (!name || !code) {
        createCodeError.innerText = 'Preencha nome e código.';
        return;
      }
      createCodeError.innerText = '';

      const filesToProcess = [];
      if (newMemorialFile.files.length > 0) {
        filesToProcess.push({ category: 'memorial', file: newMemorialFile.files[0] });
      } else {
        filesToProcess.push({ category: 'memorial', file: null });
      }
      for (let i = 0; i < monthKeys.length; i++) {
        const key = monthKeys[i];
        const inp = document.getElementById(`new_month_${key}`);
        if (inp && inp.files.length > 0) {
          filesToProcess.push({ category: key, file: inp.files[0] });
        } else {
          filesToProcess.push({ category: key, file: null });
        }
      }

      try {
        await saveItemComplete(null, name, sub_localizacao, tamanho, code, filesToProcess);
        createModal.style.display = 'none';
        refreshData();
      } catch (err) {
        console.error(err);
        if (err.message.includes('código')) {
          createCodeError.innerText = err.message;
        } else {
          alert('Erro ao criar item: ' + err.message);
        }
      }
    });

    // ==================== DOWNLOAD POR MÊS ====================
    async function downloadMonthPDFs(category, monthName) {
      try {
        if (!window.PDFLib) {
          alert("Biblioteca PDF-lib não carregada. Recarregue a página.");
          return;
        }
        const { PDFDocument } = window.PDFLib;
        const items = await getAllItemsWithFiles();
        const filesToMerge = [];
        for (const item of items) {
          const file = item.files.find(f => f.category === category);
          if (file && file.file_url) {
            const response = await fetch(file.file_url);
            if (!response.ok) continue;
            const blob = await response.blob();
            filesToMerge.push({ name: `${item.name} - ${item.code}.pdf`, blob });
          }
        }
        if (filesToMerge.length === 0) {
          alert(`Nenhum PDF encontrado para ${monthName}.`);
          return;
        }

        const mergedPdf = await PDFDocument.create();
        for (const file of filesToMerge) {
          const arrayBuffer = await file.blob.arrayBuffer();
          const pdf = await PDFDocument.load(arrayBuffer);
          const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
          copiedPages.forEach(page => mergedPdf.addPage(page));
        }
        const mergedPdfBytes = await mergedPdf.save();
        const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `todos_${monthName}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        console.error(err);
        alert(`Erro ao mesclar PDFs de ${monthName}: ${err.message}`);
      }
    }

    // ==================== INICIALIZAÇÃO ====================
    document.getElementById('addItemBtn').addEventListener('click', openCreateModal);
    document.getElementById('logoutBtn').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
      renderCards(e.target.value);
    });

    const monthContainer = document.getElementById('monthButtonsContainer');
    monthNames.forEach((month, idx) => {
      const btn = document.createElement('button');
      btn.className = 'month-btn';
      btn.textContent = month;
      btn.addEventListener('click', () => downloadMonthPDFs(monthKeys[idx], month));
      monthContainer.appendChild(btn);
    });

    window.addEventListener('DOMContentLoaded', async () => {
      await refreshData();
    });
  })();
</script>
