<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Teste</title>
  <style>
    /* (mesmo estilo anterior, pode copiar do código completo) */
    body { font-family: sans-serif; padding: 2rem; }
    .fab { position: fixed; bottom: 2rem; right: 2rem; background: #1e4a76; color: white; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 2rem; border-radius: 1rem; min-width: 300px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Dashboard de Teste</h1>
  <div id="itemsContainer">Carregando...</div>
  <button class="fab" id="addItemBtn">+</button>

  <div id="itemModal" class="modal">
    <div class="modal-content">
      <h2>Novo Item</h2>
      <input type="text" id="itemName" placeholder="Nome">
      <input type="text" id="itemCode" placeholder="Código">
      <button id="saveItemBtn">Salvar</button>
      <button id="closeModalBtn">Cancelar</button>
    </div>
  </div>

  <script>
    // Suas credenciais
    const SUPABASE_URL = "https://jklcvyuxwxgsfczrfaco.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_oCE8y5qaLovVj0BU-rANHA__Zmy3XVl";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Teste simples: buscar itens
    async function carregarItens() {
      try {
        console.log("Tentando buscar itens...");
        const { data, error } = await supabase.from('items').select('*');
        if (error) throw error;
        console.log("Itens carregados:", data);
        const container = document.getElementById('itemsContainer');
        if (data.length === 0) {
          container.innerHTML = "Nenhum item cadastrado.";
        } else {
          container.innerHTML = data.map(item => `<div><strong>${item.name}</strong> (${item.code})</div>`).join('');
        }
      } catch (err) {
        console.error("Erro ao carregar itens:", err);
        document.getElementById('itemsContainer').innerHTML = "Erro: " + err.message;
      }
    }

    // Modal
    const modal = document.getElementById('itemModal');
    const addBtn = document.getElementById('addItemBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const saveBtn = document.getElementById('saveItemBtn');
    const nameInput = document.getElementById('itemName');
    const codeInput = document.getElementById('itemCode');

    addBtn.onclick = () => { modal.style.display = 'flex'; };
    closeBtn.onclick = () => { modal.style.display = 'none'; };
    saveBtn.onclick = async () => {
      const name = nameInput.value.trim();
      const code = codeInput.value.trim();
      if (!name || !code) { alert("Preencha nome e código"); return; }
      try {
        const { data, error } = await supabase.from('items').insert({ name, code }).select();
        if (error) throw error;
        console.log("Item salvo:", data);
        modal.style.display = 'none';
        nameInput.value = '';
        codeInput.value = '';
        carregarItens();
      } catch (err) {
        alert("Erro: " + err.message);
      }
    };

    carregarItens();
  </script>
</body>
</html>
